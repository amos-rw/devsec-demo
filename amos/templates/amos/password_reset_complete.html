{% extends "amos/base.html" %}
{% block title %}Password Reset Complete{% endblock %}
{% block topbar_title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="card">
    <h1 class="card-title">Password updated</h1>
    <p style="font-size:0.875rem;color:var(--text-muted);line-height:1.7">
      Your password has been set. You can now sign in with your new credentials.
    </p>
    <div class="action-row" style="margin-top:1.25rem">
      <a href="{% url 'amos:login' %}" class="btn btn-primary">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
